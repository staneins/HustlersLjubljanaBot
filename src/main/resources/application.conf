# Hustlers Ljubljana Bot - Конфигурация

# Настройки Telegram бота
bot {
  # Токен бота от @BotFather
  # Можно переопределить через переменную окружения TELEGRAM_BOT_TOKEN
  token = ""
  
  # ID чата для мониторинга
  # Чтобы узнать ID чата, напишите боту @getmyid_bot в нужный чат
  # Можно переопределить через TARGET_CHAT_ID
  target-chat-id = 0
}

# Настройки генерации саммари
summary {
  # Интервал между генерацией саммари (в минутах)
  interval-minutes = 60
  
  # Сколько минут назад брать сообщения для саммари
  # 1440 = 24 часа, 60 = 1 час, 180 = 3 часа
  lookback-minutes = 1440
}

# Настройки MongoDB
mongodb {
  # URI подключения к MongoDB
  # Локальный: mongodb://localhost:27017/reviewbot
  # Atlas: mongodb+srv://user:pass@cluster.mongodb.net/dbname
  uri = "mongodb://localhost:27017"
  
  # Имя базы данных
  database = "telegram_review"
}

# === Настройки AI API (опционально) ===
# Раскомментируйте и настройте для использования AI-генерации саммари

# Вариант 1: Ollama (локально, бесплатно)
# Запустите Ollama: docker run -d -p 11434:11434 ollama/ollama
# Или установите нативно: https://ollama.ai
# AI_API_ENDPOINT=http://localhost:11434
# AI_MODEL=llama3.2

# Вариант 2: Google Gemini API (бесплатно до 60 запросов/мин)
# Получите ключ здесь: https://aistudio.google.com/app/apikey
# AI_API_KEY=ваш_gemini_api_key
# AI_MODEL=gemini-2.0-flash

# Вариант 3: Groq (бесплатно в beta, очень быстро)
# Получите ключ здесь: https://console.groq.com/keys
# AI_API_ENDPOINT=https://api.groq.com/openai/v1/chat/completions
# AI_API_KEY=ваш_groq_api_key
# AI_MODEL=llama-3.2-3b-preview
